syntax = "proto3";

package services.vehiclestates.parkingclimatization;

service ParkingClimatizationService {
  rpc GetParkingClimatization(GetParkingClimatizationReq) returns(stream GetParkingClimatizationResp) {}
}

message GetParkingClimatizationReq {
  string vin = 2;
}

message TimeStamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

message ParkingClimatizationInfo {
  ParkingClimatizationRunningStatus running_status = 1;
  ParkingClimatizationRequestType request_type = 2;
  uint32 time_remaining = 3;
  ParkingClimatizationHeatOrCoolAction heating_or_cooling_action = 4;
}

message ParkingClimatizationNotif {
  ParkingClimatizationNotificationType notification = 1;
}

message ParkingClimatizationStatus {
  TimeStamp timestamp = 1;
  ParkingClimatizationInfo service_info = 2;
  ParkingClimatizationNotif service_notif = 3;
}

message GetParkingClimatizationResp {
  string vin = 1;
  ParkingClimatizationStatus data = 3;
}

enum ParkingClimatizationRunningStatus {
  PARKING_CLIMATIZATION_RUNNING_STATUS_UNDEFD = 0;
  PARKING_CLIMATIZATION_RUNNING_STATUS_IDLE = 1;
  PARKING_CLIMATIZATION_RUNNING_STATUS_STRTATMPT = 2;
  PARKING_CLIMATIZATION_RUNNING_STATUS_STRTAFTDELY = 3;
  PARKING_CLIMATIZATION_RUNNING_STATUS_PRECLIMAWITHEGYFROMEXTSRCONLYACTV = 4;
  PARKING_CLIMATIZATION_RUNNING_STATUS_PRECLIMAACTV = 5;
  PARKING_CLIMATIZATION_RUNNING_STATUS_PRECLIMAANDPRECLNGACTV = 6;
  PARKING_CLIMATIZATION_RUNNING_STATUS_PRECLNGONLYACTV = 7;
  PARKING_CLIMATIZATION_RUNNING_STATUS_HEATRESIACTV = 8;
  PARKING_CLIMATIZATION_RUNNING_STATUS_DELTMR = 9;
}

enum ParkingClimatizationRequestType {
  PARKING_CLIMATIZATION_REQUEST_TYPE_UNDEFD = 0;
  PARKING_CLIMATIZATION_REQUEST_TYPE_NOREQ = 1;
  PARKING_CLIMATIZATION_REQUEST_TYPE_TMR = 2;
  PARKING_CLIMATIZATION_REQUEST_TYPE_PRECLIMANOWFROMHMI = 3;
  PARKING_CLIMATIZATION_REQUEST_TYPE_PRECLIMANOWFROMREM = 4;
  PARKING_CLIMATIZATION_REQUEST_TYPE_PRECLNGNOWFROMHMI = 5;
  PARKING_CLIMATIZATION_REQUEST_TYPE_PRECLNGNOWFROMREM = 6;
  PARKING_CLIMATIZATION_REQUEST_TYPE_HEATRESINOWFROMHMI = 7;
}

enum ParkingClimatizationHeatOrCoolAction {
  PARKING_CLIMATIZATION_HEAT_OR_COOL_ACTION_UNDEFD = 0;
  PARKING_CLIMATIZATION_HEAT_OR_COOL_ACTION_NOTRQRD = 1;
  PARKING_CLIMATIZATION_HEAT_OR_COOL_ACTION_HEATG = 2;
  PARKING_CLIMATIZATION_HEAT_OR_COOL_ACTION_COOLG = 3;
  PARKING_CLIMATIZATION_HEAT_OR_COOL_ACTION_COOLGFAST = 4;
  PARKING_CLIMATIZATION_HEAT_OR_COOL_ACTION_VENTNONLY = 5;
}

enum ParkingClimatizationNotificationType {
  PARKING_CLIMATIZATION_NOTIFICATION_TYPE_UNDEFD = 0;
  PARKING_CLIMATIZATION_NOTIFICATION_TYPE_NOWARN = 1;
  PARKING_CLIMATIZATION_NOTIFICATION_TYPE_FULO = 2;
  PARKING_CLIMATIZATION_NOTIFICATION_TYPE_BATTLO = 3;
  PARKING_CLIMATIZATION_NOTIFICATION_TYPE_NOTCNCTTOPWR = 4;
  PARKING_CLIMATIZATION_NOTIFICATION_TYPE_CLIMAWITHINOKLIM = 5;
  PARKING_CLIMATIZATION_NOTIFICATION_TYPE_SRVRGRD = 6;
  PARKING_CLIMATIZATION_NOTIFICATION_TYPE_LIMDCHRGLO = 7;
  PARKING_CLIMATIZATION_NOTIFICATION_TYPE_TMPNOTPSBL = 8;
}
